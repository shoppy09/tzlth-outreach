{% macro notify_modal() %}
<div id="notifyModal" class="modal fade" tabindex="-1" aria-labelledby="notifyModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="notifyModalLabel">
          <i class="fas fa-bell me-2" style="color:var(--amber)"></i>通知設定
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="關閉"></button>
      </div>

      <div class="modal-body">

        <!-- 說明 -->
        <div class="mb-4 p-3" style="background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.2);border-radius:8px;font-size:13px;line-height:1.6;color:var(--text)">
          <i class="fas fa-info-circle me-2" style="color:var(--amber)"></i>
          開啟瀏覽器通知後，系統會在跟進日期當天自動提醒你，避免遺漏重要聯絡時機。
        </div>

        <!-- 目前狀態 -->
        <div class="mb-4">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">目前通知狀態</div>
          <div id="notifyStatusBadge" class="d-inline-flex align-items-center gap-2 px-3 py-2"
               style="border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--border);background:rgba(139,146,169,.1);color:var(--muted)">
            <i class="fas fa-circle-question"></i>
            <span id="notifyStatusText">讀取中...</span>
          </div>
        </div>

        <!-- 操作按鈕 -->
        <div class="d-flex flex-column gap-2">

          <button id="btnRequestNotify" class="btn btn-primary" onclick="requestNotifyPermission()">
            <i class="fas fa-bell me-2"></i>開啟瀏覽器通知
          </button>

          <button id="btnTestNotify" class="btn btn-outline-secondary" onclick="sendTestNotify()" disabled>
            <i class="fas fa-paper-plane me-2"></i>發送測試通知
          </button>

        </div>

        <!-- 瀏覽器不支援提示 -->
        <div id="notifyUnsupported" class="mt-3 d-none">
          <div class="alert alert-warning mb-0" style="font-size:12px;border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.1);color:var(--amber)">
            <i class="fas fa-exclamation-triangle me-2"></i>
            您的瀏覽器不支援桌面通知功能，請使用 Chrome 或 Edge 開啟本系統。
          </div>
        </div>

        <!-- 拒絕提示 -->
        <div id="notifyDeniedHint" class="mt-3 d-none">
          <div class="alert mb-0" style="font-size:12px;border-color:rgba(224,92,92,.3);background:rgba(224,92,92,.08);color:var(--red)">
            <i class="fas fa-ban me-2"></i>
            通知已被封鎖。請點選瀏覽器網址列左側的鎖頭圖示，將通知權限改為「允許」後重新整理頁面。
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
          <i class="fas fa-times me-1"></i>關閉
        </button>
      </div>

    </div>
  </div>
</div>

<script>
(function () {
  // ── 狀態顏色對應 ──
  var statusMap = {
    granted: {
      icon: 'fas fa-check-circle',
      text: '已允許',
      color: 'var(--green)',
      bg: 'rgba(52,201,135,.1)',
      border: 'rgba(52,201,135,.25)'
    },
    denied: {
      icon: 'fas fa-ban',
      text: '已拒絕',
      color: 'var(--red)',
      bg: 'rgba(224,92,92,.1)',
      border: 'rgba(224,92,92,.25)'
    },
    default: {
      icon: 'fas fa-circle-question',
      text: '未設定',
      color: 'var(--muted)',
      bg: 'rgba(139,146,169,.1)',
      border: 'var(--border)'
    }
  };

  function updateUI(permission) {
    var s = statusMap[permission] || statusMap['default'];
    var badge = document.getElementById('notifyStatusBadge');
    var text  = document.getElementById('notifyStatusText');
    var btnReq  = document.getElementById('btnRequestNotify');
    var btnTest = document.getElementById('btnTestNotify');
    var unsupported = document.getElementById('notifyUnsupported');
    var deniedHint  = document.getElementById('notifyDeniedHint');

    badge.style.color      = s.color;
    badge.style.background = s.bg;
    badge.style.borderColor = s.border;
    badge.querySelector('i').className = s.icon;
    text.textContent = s.text;

    // 按鈕狀態
    if (permission === 'granted') {
      btnReq.disabled  = true;
      btnTest.disabled = false;
      btnReq.innerHTML = '<i class="fas fa-check me-2"></i>通知已開啟';
    } else if (permission === 'denied') {
      btnReq.disabled  = true;
      btnTest.disabled = true;
      deniedHint.classList.remove('d-none');
    } else {
      btnReq.disabled  = false;
      btnTest.disabled = true;
    }

    if (!('Notification' in window)) {
      unsupported.classList.remove('d-none');
      btnReq.disabled  = true;
      btnTest.disabled = true;
    }
  }

  // ── 初始化：讀取目前權限 ──
  function initNotifyStatus() {
    if (!('Notification' in window)) {
      updateUI('__unsupported__');
      document.getElementById('notifyUnsupported').classList.remove('d-none');
      document.getElementById('btnRequestNotify').disabled = true;
      document.getElementById('btnTestNotify').disabled = true;
      var badge = document.getElementById('notifyStatusBadge');
      badge.querySelector('i').className = 'fas fa-circle-xmark';
      document.getElementById('notifyStatusText').textContent = '不支援';
      return;
    }
    updateUI(Notification.permission);
  }

  // ── 在 modal 每次顯示時更新狀態 ──
  var modal = document.getElementById('notifyModal');
  if (modal) {
    modal.addEventListener('show.bs.modal', initNotifyStatus);
  }

  // ── 全域：請求通知權限 ──
  window.requestNotifyPermission = function () {
    if (!('Notification' in window)) return;
    Notification.requestPermission().then(function (perm) {
      updateUI(perm);
      if (perm === 'granted') {
        new Notification('合作拓展系統', {
          body: '通知已成功開啟！系統將在跟進日期當天提醒你。',
          icon: '/static/icon.png'
        });
      }
    });
  };

  // ── 全域：測試通知 ──
  window.sendTestNotify = function () {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    new Notification('合作拓展系統', {
      body: '這是測試通知',
      icon: '/static/icon.png'
    });
  };

  // 初始執行一次（以防 modal 已在 DOM 中但未顯示）
  initNotifyStatus();
})();
</script>
{% endmacro %}
