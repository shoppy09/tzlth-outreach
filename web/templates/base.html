<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}合作拓展系統{% endblock %} — 蒲朝棟</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg:      #0f1117;
  --sidebar: #1a1d2e;
  --card:    #1e2130;
  --border:  #2a2d3e;
  --accent:  #4f8ef7;
  --teal:    #2ab0c5;
  --green:   #34c987;
  --amber:   #f5a623;
  --red:     #e05c5c;
  --text:    #e2e6f0;
  --muted:   #8b92a9;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 220px; background: var(--sidebar); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); z-index: 100; }
.sidebar-brand { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
.sidebar-brand .name { font-weight: 700; font-size: 15px; color: var(--text); }
.sidebar-brand .sub  { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
.nav-item a { display: flex; align-items: center; gap: 10px; padding: 9px 16px; color: var(--muted); text-decoration: none; font-size: 13.5px; border-left: 3px solid transparent; transition: all .15s; }
.nav-item a:hover { color: var(--text); background: rgba(255,255,255,.04); }
.nav-item a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(79,142,247,.08); }
.nav-item a i { width: 16px; text-align: center; font-size: 13px; }
.nav-section { font-size: 10px; font-weight: 600; color: var(--muted); padding: 14px 16px 4px; letter-spacing: .08em; text-transform: uppercase; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

/* Main */
.main { margin-left: 220px; min-height: 100vh; }
.topbar { background: var(--sidebar); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar h1 { font-size: 16px; font-weight: 600; margin: 0; }
.content { padding: 24px; }

/* Cards */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.card-header { background: transparent; border-bottom: 1px solid var(--border); padding: 14px 18px; font-weight: 600; font-size: 14px; }
.card-body { padding: 18px; }

/* Stat Cards */
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
.stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-card .sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
.stat-card.accent { border-color: rgba(79,142,247,.3); background: rgba(79,142,247,.06); }
.stat-card.green  { border-color: rgba(52,201,135,.3); background: rgba(52,201,135,.06); }
.stat-card.amber  { border-color: rgba(245,166,35,.3);  background: rgba(245,166,35,.06); }
.stat-card.red    { border-color: rgba(224,92,92,.3);   background: rgba(224,92,92,.06); }
.stat-card.teal   { border-color: rgba(42,176,197,.3);  background: rgba(42,176,197,.06); }

/* Table */
.table { color: var(--text); font-size: 13px; }
.table thead th { background: var(--sidebar); color: var(--muted); border-color: var(--border); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; padding: 10px 12px; }
.table tbody td { border-color: var(--border); padding: 10px 12px; vertical-align: middle; }
.table tbody tr:hover td { background: rgba(255,255,255,.025); }
.table-responsive { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }

/* Badges */
.badge-status { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.s-未聯絡   { background: rgba(139,146,169,.15); color: var(--muted); }
.s-已發信   { background: rgba(245,166,35,.15);  color: var(--amber); }
.s-已回覆   { background: rgba(79,142,247,.15);  color: var(--accent); }
.s-已安排會議 { background: rgba(42,176,197,.15); color: var(--teal); }
.s-合作中   { background: rgba(52,201,135,.15);  color: var(--green); }
.s-暫不合適 { background: rgba(224,92,92,.15);   color: var(--red); }
.p-高 { color: var(--red);   font-weight: 700; }
.p-中 { color: var(--amber); font-weight: 600; }
.p-低 { color: var(--muted); }

/* Forms */
.form-control, .form-select {
  background: var(--sidebar); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; font-size: 13px;
}
.form-control:focus, .form-select:focus {
  background: var(--sidebar); border-color: var(--accent);
  color: var(--text); box-shadow: 0 0 0 2px rgba(79,142,247,.2);
}
.form-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.form-select option { background: var(--sidebar); }

/* Buttons */
.btn-primary   { background: var(--accent); border-color: var(--accent); }
.btn-primary:hover { background: #3d7de8; border-color: #3d7de8; }
.btn-teal      { background: var(--teal);  border-color: var(--teal); color: #fff; }
.btn-teal:hover{ background: #23a0b5; color: #fff; }
.btn-success   { background: var(--green); border-color: var(--green); }
.btn-outline-secondary { border-color: var(--border); color: var(--muted); }
.btn-outline-secondary:hover { background: var(--border); color: var(--text); }
.btn-sm { font-size: 12px; padding: 3px 9px; }

/* Alerts */
.alert { border-radius: 8px; font-size: 13px; }

/* Modal */
.modal-content  { background: var(--card); border: 1px solid var(--border); }
.modal-header   { border-bottom: 1px solid var(--border); }
.modal-footer   { border-top: 1px solid var(--border); }
.modal-title    { font-size: 15px; font-weight: 600; }

/* Script box */
.script-box { background: var(--sidebar); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
.email-preview { background: var(--sidebar); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; min-height: 300px; }

/* Toast */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
.toast { background: var(--card); border: 1px solid var(--border); color: var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Mobile RWD */
.hamburger { display:none; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; padding:4px 8px; }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform .25s; z-index: 200; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .hamburger { display:block; }
  .topbar h1 { font-size:14px; }
  .content { padding: 14px; }
  .kpi-row { grid-template-columns: repeat(3,1fr) !important; }
  .stat-card .value { font-size: 22px; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:150; }
  .sidebar-overlay.open { display:block; }
}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="name">蒲朝棟 Tim Pu</div>
    <div class="sub">CDA 國際職涯諮詢師<br>104 職涯引導師｜桃園</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">主要功能</div>
    <div class="nav-item"><a href="/" class="{{ 'active' if request.path=='/' }}"><i class="fas fa-chart-line"></i> 儀表板</a></div>
    <div class="nav-item"><a href="/targets" class="{{ 'active' if request.path=='/targets' }}"><i class="fas fa-building"></i> 目標單位</a></div>
    <div class="nav-item"><a href="/kanban" class="{{ 'active' if '/kanban' in request.path }}"><i class="fas fa-columns"></i> 看板視圖</a></div>
    <div class="nav-item"><a href="/batch" class="{{ 'active' if '/batch' in request.path }}"><i class="fas fa-paper-plane"></i> 批次發信</a></div>
    <div class="nav-item"><a href="/records" class="{{ 'active' if '/records' in request.path }}"><i class="fas fa-history"></i> 聯絡記錄</a></div>
    <div class="nav-section">報告 & 文件</div>
    <div class="nav-item"><a href="/report" class="{{ 'active' if request.path=='/report' }}"><i class="fas fa-file-chart-pie"></i> 週報分析</a></div>
    <div class="nav-item"><a href="/export" class="{{ 'active' if '/export' in request.path }}"><i class="fas fa-file-excel"></i> 匯出報表</a></div>
    <div class="nav-section">系統設定</div>
    <div class="nav-item"><a href="/templates" class="{{ 'active' if '/templates' in request.path }}"><i class="fas fa-file-alt"></i> 範本管理</a></div>
    <div class="nav-item"><a href="#" onclick="openNotifySettings()"><i class="fas fa-bell"></i> 通知設定</a></div>
  </nav>
  <div class="sidebar-footer">
    <i class="fas fa-circle text-success me-1" style="font-size:8px"></i> 系統運作中
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="topbar">
    <div class="d-flex align-items-center gap-2">
      <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1>{% block page_title %}{% endblock %}</h1>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-sm btn-outline-secondary" onclick="checkReplies()" title="檢查回信">
        <i class="fas fa-inbox me-1"></i>檢查回信
      </button>
      <span class="text-muted" style="font-size:12px">{{ now }}</span>
    </div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="mainToast" class="toast align-items-center" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- 通知 Modal -->
<div id="notifyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:center;justify-content:center">
  <div class="card" style="width:400px;padding:24px">
    <div style="font-weight:700;font-size:15px;margin-bottom:16px">
      <i class="fas fa-bell me-2" style="color:var(--amber)"></i>瀏覽器通知設定
    </div>
    <div class="mb-3 p-3" style="background:var(--sidebar);border-radius:8px;font-size:13px;color:var(--muted)">
      開啟後，當天有跟進任務時系統會自動提醒你。
    </div>
    <div class="mb-3 d-flex align-items-center gap-2">
      <span style="font-size:13px">目前狀態：</span>
      <span id="notifyStatus" style="font-size:13px;font-weight:600"></span>
    </div>
    <div class="d-flex flex-column gap-2">
      <button class="btn btn-primary" onclick="requestNotifyPermission()">
        <i class="fas fa-bell me-1"></i>允許瀏覽器通知
      </button>
      <button class="btn btn-outline-secondary" onclick="sendTestNotify()">
        <i class="fas fa-paper-plane me-1"></i>發送測試通知
      </button>
      <button class="btn btn-outline-secondary" onclick="document.getElementById('notifyModal').style.display='none'">
        關閉
      </button>
    </div>
  </div>
</div>
<script>
Chart.defaults.color = '#8b92a9';
Chart.defaults.borderColor = '#2a2d3e';

function showToast(msg, type='success') {
  const el = document.getElementById('mainToast');
  el.className = `toast align-items-center text-bg-${type==='success'?'success':type==='error'?'danger':'warning'}`;
  document.getElementById('toastMsg').textContent = msg;
  new bootstrap.Toast(el, {delay:3500}).show();
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ── 瀏覽器通知 ────────────────────────────────────────────────────────────────
function openNotifySettings() {
  const status = Notification.permission;
  const labels = {granted:'✅ 已允許', denied:'❌ 已拒絕', default:'⚠️ 未設定'};
  document.getElementById('notifyStatus').textContent = labels[status] || status;
  document.getElementById('notifyStatus').style.color =
    status==='granted' ? 'var(--green)' : status==='denied' ? 'var(--red)' : 'var(--amber)';
  document.getElementById('notifyModal').style.display = 'flex';
}

function requestNotifyPermission() {
  Notification.requestPermission().then(p => {
    openNotifySettings();
    if(p==='granted') { showToast('通知已開啟！'); checkTodayTodos(); }
    else showToast('通知被拒絕，請在瀏覽器設定中允許', 'warning');
  });
}

function sendTestNotify() {
  if(Notification.permission !== 'granted') {
    showToast('請先允許通知', 'warning'); return;
  }
  new Notification('合作拓展系統', {
    body: '這是測試通知 — 系統運作正常！',
    icon: 'https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/svgs/solid/building.svg'
  });
}

function checkTodayTodos() {
  if(Notification.permission !== 'granted') return;
  fetch('/api/today-todos').then(r=>r.json()).then(d => {
    if(d.count === 0) return;
    const overdue = d.overdue.map(r=>r['單位名稱']).join('、');
    const today   = d.today.map(r=>r['單位名稱']).join('、');
    let body = '';
    if(d.overdue.length > 0) body += `⚠️ 逾期：${overdue}\n`;
    if(d.today.length  > 0) body += `📅 今日：${today}`;
    new Notification(`合作拓展系統 — 今日有 ${d.count} 筆待跟進`, { body: body.trim() });
  });
}

// 頁面載入時自動檢查今日通知
window.addEventListener('load', () => setTimeout(checkTodayTodos, 2000));

function checkReplies() {
  fetch('/check-replies', {method:'POST'})
    .then(r=>r.json()).then(d=>{
      if(d.ok) showToast(d.updated>0 ? `偵測到 ${d.updated} 封回信，狀態已更新` : '目前無新回信');
      else showToast('檢查失敗：'+d.msg, 'error');
    });
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
